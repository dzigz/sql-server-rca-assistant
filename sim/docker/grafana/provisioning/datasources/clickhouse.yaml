apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse-rca  # Fixed UID for dashboard references
    access: proxy
    isDefault: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: rca
      defaultDatabase: rca_metrics
    secureJsonData:
      password: rca_password
    editable: false
